    <script>

        var openPageTime = null;

        function datetime() {
            //创建日期时间对象
            var datetime = new Date();
            //获取组件
            var year = datetime.getFullYear();
            var month = datetime.getMonth() + 1;
            var day = datetime.getDate();
            var hour = datetime.getHours();
            var minute = datetime.getMinutes();
            var second = datetime.getSeconds();
            if (hour < 10) {
                var hour = 0 + "" + hour;
            }
            if (minute < 10) {
                var minute = 0 + "" + minute;
            }
            if (second < 10) {
                var second = 0 + "" + second;
            }
            var nowDate = month + "月" + day + "日";
            var nowTime = hour + ":" + minute + ":" + second;
            //更新内容

            openPageTime = year + '-' + month + "-" + day + ' ' + hour + ":" + minute + ":" + second;

            $(".date-wrap").html(nowDate);
            $(".time-wrap").html(nowTime);
        }

        setInterval(datetime, 1000);


        setTimeout(function () {
            if (openPageTime) {
                console.log($('#time')[0]);
                $('#time').html('凭证启用时间' + openPageTime)
            }
        }, 1000)

        $(function () {
            var m = 0;
            var s = 0;
            var timer = setInterval(function () {
                if (m == 0 && s == 0) {
                    clearInterval(timer);
                }
                if (s < 10) {
                    //如果秒数少于10在前面加上0
                    $('.countdown').html(m + '分0' + s + '秒');
                } else {
                    $('.countdown').html(m + '分' + s + '秒');
                }
                s--;
                if (s < 0) {
                    //如果秒数少于0就变成59秒
                    s = 59;
                    m--;
                }
            }, 1000)
        })
    </script>
